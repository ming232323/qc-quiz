<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品管測驗練習系統 (Pro版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* 顏色變數系統 (支援明暗切換) */
        :root {
            --bg-color: #f4f6f8;
            --container-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --panel-bg: #e6f7ff;
            --panel-border: #91d5ff;
            --input-bg: #ffffff;
            --input-border: #cbd5e0;
            --input-text: #2d3748;
            --btn-mode-bg: #ffffff;
            --btn-mode-text: #2d3748;
            --stats-bg: #f7fafc;
            --q-box-bg: #e6fffa;
            --q-box-border: #319795;
            --tag-bg: #b2f5ea;
            --tag-text: #234e52;
            --option-bg: #ffffff;
            --option-border: #e2e8f0;
            --option-hover-bg: #ebf8ff;
            --option-hover-border: #4299e1;
            --option-text: #2d3748;
            --result-correct-bg: #c6f6d5;
            --result-correct-text: #2f855a;
            --result-wrong-bg: #fed7d7;
            --result-wrong-text: #c53030;
            --border-line: #edf2f7;
        }

        /* 深色模式變數 */
        body.dark-mode {
            --bg-color: #1a202c;
            --container-bg: #2d3748;
            --text-main: #e2e8f0;
            --text-muted: #a0aec0;
            --panel-bg: #2a4365;
            --panel-border: #2c5282;
            --input-bg: #1a202c;
            --input-border: #4a5568;
            --input-text: #e2e8f0;
            --btn-mode-bg: #4a5568;
            --btn-mode-text: #e2e8f0;
            --stats-bg: #1a202c;
            --q-box-bg: #234e52;
            --q-box-border: #38b2ac;
            --tag-bg: #285e61;
            --tag-text: #e6fffa;
            --option-bg: #4a5568;
            --option-border: #4a5568;
            --option-hover-bg: #2b6cb0;
            --option-hover-border: #63b3ed;
            --option-text: #f7fafc;
            --result-correct-bg: rgba(72, 187, 120, 0.2);
            --result-correct-text: #68d391;
            --result-wrong-bg: rgba(245, 101, 101, 0.2);
            --result-wrong-text: #fc8181;
            --border-line: #4a5568;
        }

        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; transition: background-color 0.3s;}
        .container { background: var(--container-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 800px; box-sizing: border-box; position: relative; transition: background-color 0.3s;}
        
        /* 深色模式切換按鈕 */
        .theme-toggle { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; background: none; border: none; user-select: none; transition: transform 0.2s;}
        .theme-toggle:hover { transform: scale(1.1); }

        .header { text-align: center; border-bottom: 2px solid var(--border-line); padding-bottom: 15px; margin-bottom: 20px; }
        .stats { color: var(--text-muted); font-size: 15px; margin-top: 10px; background: var(--stats-bg); padding: 10px; border-radius: 8px; display: inline-block;}
        
        .dashboard-panel { display: flex; flex-direction: column; gap: 15px; background: var(--panel-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--panel-border); }
        .control-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .control-group input, .control-group select { padding: 10px; border: 1px solid var(--input-border); border-radius: 6px; font-size: 16px; flex: 1; min-width: 150px; background: var(--input-bg); color: var(--input-text);}
        
        .mode-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .btn-mode { flex: 1; min-width: 140px; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; background: var(--btn-mode-bg); color: var(--btn-mode-text); box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .btn-mode:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-mode.primary { background: #1890ff; color: white; }
        .btn-mode.warning { background: #fa8c16; color: white; }
        .btn-mode.danger { background: #f5222d; color: white; }
        .btn-mode.star { background: #fadb14; color: #5c0011; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-back { background: var(--stats-bg); color: var(--text-main); padding: 8px 15px; border: 1px solid var(--border-line); border-radius: 6px; cursor: pointer; font-weight: bold; }
        .timer { font-size: 18px; font-weight: bold; color: #e53e3e; background: #fed7d7; padding: 5px 15px; border-radius: 20px; display: none; }
        
        .question-box { border-left: 5px solid var(--q-box-border); background: var(--q-box-bg); padding: 25px; border-radius: 6px; margin-bottom: 20px; position: relative; min-height: 100px; transition: all 0.3s;}
        .category-tag { position: absolute; right: 10px; bottom: 10px; font-size: 12px; color: var(--tag-text); background: var(--tag-bg); padding: 4px 10px; border-radius: 20px; font-weight: bold;}
        .star-btn { position: absolute; right: 15px; top: 15px; font-size: 24px; cursor: pointer; user-select: none; transition: transform 0.2s; }
        .star-btn:hover { transform: scale(1.2); }
        .starred { color: #f6ad55; text-shadow: 0 0 5px rgba(246, 173, 85, 0.5);}
        .unstarred { color: var(--text-muted); opacity: 0.5;}

        .options-box { display: flex; flex-direction: column; gap: 12px; }
        .option { cursor: pointer; padding: 15px; border-radius: 8px; border: 1px solid var(--option-border); background: var(--option-bg); color: var(--option-text); transition: all 0.2s; font-size: 16px; display: flex; align-items: flex-start; line-height: 1.5; }
        .option:hover { background: var(--option-hover-bg); border-color: var(--option-hover-border); transform: translateX(5px); }
        .option strong { margin-right: 12px; color: #3182ce; min-width: 30px;}
        body.dark-mode .option strong { color: #63b3ed; }
        
        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        .btn-next { padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: bold; background: #3182ce; color: white; width: 100%; max-width: 300px;}
        
        .result { margin-top: 20px; font-weight: bold; text-align: center; font-size: 20px; min-height: 30px; padding: 10px; border-radius: 6px; }
        .correct { color: var(--result-correct-text); background: var(--result-correct-bg); border: 1px solid var(--result-correct-text);}
        .wrong { color: var(--result-wrong-text); background: var(--result-wrong-bg); border: 1px solid var(--result-wrong-text);}
        
        #loading-screen { text-align: center; padding: 50px; }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="切換深淺色模式">🌙</button>

    <div id="loading-screen">
        <h2 style="color: #3182ce;">🔄 正在載入題庫與個人紀錄...</h2>
        <p style="color: var(--text-muted);">系統正在自 Google 試算表同步最新題目</p>
    </div>

    <div id="dashboard-ui" style="display:none;">
        <div class="header" style="border:none;">
            <h2 style="margin:0; color:#2c5282;">🏗️ 品管測驗系統 主控台</h2>
            <div class="stats">
                📂 總題庫: <span id="db-total">0</span> 題 | 
                ❌ 你的錯題本: <span id="db-wrong">0</span> 題 | 
                ⭐ 你的收藏: <span id="db-star">0</span> 題
            </div>
        </div>

        <div class="dashboard-panel">
            <h3>⚙️ 練習設定</h3>
            <div class="control-group">
                <input type="text" id="search-input" placeholder="🔍 關鍵字過濾...">
                <select id="category-select">
                    <option value="ALL">全單元範圍</option>
                </select>
                <select id="mock-count-select" style="flex: 0.5;">
                    <option value="50">模考: 50題 (50分)</option>
                    <option value="100">模考: 100題 (100分)</option>
                    <option value="150">模考: 150題 (150分)</option>
                </select>
            </div>
            
            <div class="mode-buttons">
                <button class="btn-mode primary" onclick="startQuiz('sequential')">📖 循序漸進練習<br><span style="font-size:12px; font-weight:normal;">依序顯示過濾範圍內的題目</span></button>
                <button class="btn-mode warning" onclick="startQuiz('random')">⏱️ 進入模擬考<br><span style="font-size:12px; font-weight:normal;">依上方設定數量抽題與計時</span></button>
                <button class="btn-mode danger" onclick="startQuiz('wrong')">🔥 錯題本衝刺<br><span style="font-size:12px; font-weight:normal;">只複習你曾經答錯的題目</span></button>
                <button class="btn-mode star" onclick="startQuiz('starred')">⭐ 精華收藏複習<br><span style="font-size:12px; font-weight:normal;">只複習你有打星號的題目</span></button>
            </div>
        </div>
    </div>

    <div id="quiz-ui" style="display:none;">
        <div class="top-bar">
            <button class="btn-back" onclick="backToDashboard()">← 回主控台</button>
            <div class="timer" id="quiz-timer">50:00</div>
            <div style="font-weight:bold; color:var(--text-main);">進度: <span id="current-progress">0/0</span></div>
        </div>

        <div class="header" style="padding-bottom: 5px; margin-bottom: 10px; border:none;">
            <div class="stats" style="margin-top:0;">
                ✅ 答對: <span id="session-correct">0</span> | ❌ 答錯: <span id="session-wrong">0</span>
            </div>
        </div>

        <div class="question-box">
            <span style="font-weight:bold; color:#3182ce; font-size:14px; margin-right:10px;" id="q-id"></span>
            <span id="question-text" style="font-size: 18px; line-height: 1.6; font-weight: 500;">題目載入中...</span>
            <div class="category-tag" id="category-text"></div>
            <div class="star-btn unstarred" id="star-btn" onclick="toggleStar()" title="加入/移除收藏">☆</div>
        </div>

        <div class="options-box" id="options-area"></div>
        <div class="result" id="result-text" style="display:none;"></div>

        <div class="controls">
            <button class="btn-next" id="btn-next">下一題 (J)</button>
        </div>
    </div>
</div>

<script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSyCMTaW70xGIR1uHhJ9HGCyQam4Zqqwk_ozsB5EUy34bWXdOzIkp7EaM_hRL6clHjjXVuJJl4brcm3/pub?output=csv';

    // 資料庫與狀態追蹤
    let allQuestions = [];
    let currentQuizList = [];
    let currentIndex = 0;
    let sessionCorrect = 0;
    let sessionWrong = 0;
    let isAnswered = false;
    let timerInterval = null;

    // LocalStorage 記憶庫
    let wrongRecord = JSON.parse(localStorage.getItem('qc_wrong_ids')) || [];
    let starRecord = JSON.parse(localStorage.getItem('qc_star_ids')) || [];

    // --- 深淺色模式切換邏輯 ---
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('qc_theme', isDark ? 'dark' : 'light');
        document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
    }

    // 初始化讀取
    window.onload = function() {
        // 讀取上次的主題設定
        if(localStorage.getItem('qc_theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('theme-btn').textContent = '☀️';
        }

        Papa.parse(SHEET_CSV_URL, {
            download: true,
            header: false,
            skipEmptyLines: true,
            downloadRequestHeaders: { "Cache-Control": "no-cache" },
            complete: function(results) {
                let categories = new Set();
                
                allQuestions = results.data.filter(row => {
                    return row.length >= 4 && row[2] && row[2].includes("(A)");
                }).map(row => {
                    let parsed = parseQuestionText(row[2]);
                    let cat = row[1] ? row[1].trim() : "綜合單元";
                    categories.add(cat);
                    
                    return {
                        id: row[0] || "無",
                        category: cat,
                        questionText: parsed.q,
                        options: parsed.opt,
                        answer: row[3] ? row[3].toString().toUpperCase().replace(/[^A-D]/g, '') : ""
                    };
                }).filter(q => q.options.length > 0 && q.answer !== "");

                const catSelect = document.getElementById('category-select');
                categories.forEach(cat => {
                    let option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    catSelect.appendChild(option);
                });

                updateDashboardStats();
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('dashboard-ui').style.display = 'block';
            }
        });
    };

    function parseQuestionText(text) {
        let q = text;
        let opt = [];
        let splitMatch = text.match(/(?:\(|（)\s*[Aa]\s*(?:\)|）)/);
        if(splitMatch) {
            let splitIndex = splitMatch.index;
            q = text.substring(0, splitIndex).trim();
            let optionsText = text.substring(splitIndex);
            let optRegex = /(?:\(|（)\s*[A-Da-d]\s*(?:\)|）)\s*/;
            opt = optionsText.split(optRegex).filter(Boolean);
        }
        return { q: q, opt: opt };
    }

    function updateDashboardStats() {
        document.getElementById('db-total').textContent = allQuestions.length;
        document.getElementById('db-wrong').textContent = wrongRecord.length;
        document.getElementById('db-star').textContent = starRecord.length;
    }

    function startQuiz(mode) {
        const keyword = document.getElementById('search-input').value.toLowerCase();
        const category = document.getElementById('category-select').value;
        const mockCount = parseInt(document.getElementById('mock-count-select').value);
        
        let filtered = allQuestions.filter(q => {
            let matchCat = (category === 'ALL' || q.category === category);
            let matchKey = (keyword === '' || q.questionText.toLowerCase().includes(keyword));
            return matchCat && matchKey;
        });

        if (mode === 'wrong') {
            filtered = filtered.filter(q => wrongRecord.includes(q.id));
            if(filtered.length === 0) return alert("太神啦！目前所選範圍內沒有錯題紀錄！");
        } else if (mode === 'starred') {
            filtered = filtered.filter(q => starRecord.includes(q.id));
            if(filtered.length === 0) return alert("目前所選範圍內沒有收藏打星號的題目！");
        } else if (mode === 'random') {
            // 隨機抽題並啟動計時 (每題給1分鐘)
            filtered = filtered.sort(() => 0.5 - Math.random()).slice(0, mockCount);
            startTimer(mockCount * 60); 
        }

        if(filtered.length === 0) return alert("找不到符合條件的題目，請重新設定條件。");

        currentQuizList = filtered;
        currentIndex = 0;
        sessionCorrect = 0;
        sessionWrong = 0;
        
        document.getElementById('session-correct').textContent = '0';
        document.getElementById('session-wrong').textContent = '0';
        document.getElementById('dashboard-ui').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        
        loadQuestion();
    }

    function backToDashboard() {
        clearInterval(timerInterval);
        document.getElementById('quiz-timer').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('dashboard-ui').style.display = 'block';
        updateDashboardStats(); 
    }

    function loadQuestion() {
        if (currentIndex >= currentQuizList.length) {
            alert(`測驗結束！本回合答對: ${sessionCorrect} 題，答錯: ${sessionWrong} 題。`);
            return backToDashboard();
        }
        
        const q = currentQuizList[currentIndex];
        isAnswered = false;

        document.getElementById('current-progress').textContent = `${currentIndex + 1} / ${currentQuizList.length}`;
        document.getElementById('q-id').textContent = `[題號: ${q.id}]`;
        document.getElementById('question-text').textContent = q.questionText;
        document.getElementById('category-text').textContent = q.category;
        
        const resultUI = document.getElementById('result-text');
        resultUI.style.display = 'none';
        resultUI.className = "result";

        const starBtn = document.getElementById('star-btn');
        if (starRecord.includes(q.id)) {
            starBtn.textContent = '★';
            starBtn.className = 'star-btn starred';
        } else {
            starBtn.textContent = '☆';
            starBtn.className = 'star-btn unstarred';
        }

        const optionsArea = document.getElementById('options-area');
        optionsArea.innerHTML = "";
        const labels = ['A', 'B', 'C', 'D'];
        
        q.options.forEach((optText, i) => {
            if (i >= 4) return;
            const label = labels[i];
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<strong>(${label})</strong> <span>${optText.trim()}</span>`;
            div.onclick = () => checkAnswer(label, q.answer, div);
            optionsArea.appendChild(div);
        });
    }

    function checkAnswer(selected, correct, element) {
        if (isAnswered) return; 
        isAnswered = true;
        
        const qId = currentQuizList[currentIndex].id;
        const result = document.getElementById('result-text');
        result.style.display = 'block';
        
        // 判斷是否為深色模式，以給予正確的背景色回饋
        const isDark = document.body.classList.contains('dark-mode');

        if (selected === correct) {
            result.textContent = "✅ 答對！";
            result.className = "result correct";
            element.style.backgroundColor = isDark ? "rgba(72, 187, 120, 0.3)" : "#e6fffa";
            element.style.borderColor = "#38b2ac";
            sessionCorrect++;
            
            if(wrongRecord.includes(qId)) {
                wrongRecord = wrongRecord.filter(id => id !== qId);
                localStorage.setItem('qc_wrong_ids', JSON.stringify(wrongRecord));
            }
        } else {
            result.textContent = `❌ 錯誤！正確答案是 (${correct})`;
            result.className = "result wrong";
            element.style.backgroundColor = isDark ? "rgba(245, 101, 101, 0.3)" : "#fff5f5"; 
            element.style.borderColor = "#e53e3e";
            sessionWrong++;
            
            if(!wrongRecord.includes(qId)) {
                wrongRecord.push(qId);
                localStorage.setItem('qc_wrong_ids', JSON.stringify(wrongRecord));
            }
            
            const labels = ['A', 'B', 'C', 'D'];
            const correctIndex = labels.indexOf(correct);
            const optElements = document.querySelectorAll('.option');
            if(optElements[correctIndex]) {
                 optElements[correctIndex].style.border = "2px solid #38b2ac";
                 optElements[correctIndex].style.backgroundColor = isDark ? "rgba(72, 187, 120, 0.15)" : "#f0fff4";
            }
        }
        document.getElementById('session-correct').textContent = sessionCorrect;
        document.getElementById('session-wrong').textContent = sessionWrong;
    }

    function toggleStar() {
        const qId = currentQuizList[currentIndex].id;
        const starBtn = document.getElementById('star-btn');
        
        if (starRecord.includes(qId)) {
            starRecord = starRecord.filter(id => id !== qId);
            starBtn.textContent = '☆';
            starBtn.className = 'star-btn unstarred';
        } else {
            starRecord.push(qId);
            starBtn.textContent = '★';
            starBtn.className = 'star-btn starred';
        }
        localStorage.setItem('qc_star_ids', JSON.stringify(starRecord));
    }

    function startTimer(seconds) {
        clearInterval(timerInterval);
        const timerUI = document.getElementById('quiz-timer');
        timerUI.style.display = 'block';
        
        let remaining = seconds;
        // 初始化顯示
        let m = Math.floor(remaining / 60).toString().padStart(2, '0');
        let s = (remaining % 60).toString().padStart(2, '0');
        timerUI.textContent = `${m}:${s}`;

        timerInterval = setInterval(() => {
            remaining--;
            let m = Math.floor(remaining / 60).toString().padStart(2, '0');
            let s = (remaining % 60).toString().padStart(2, '0');
            timerUI.textContent = `${m}:${s}`;
            
            if (remaining <= 0) {
                clearInterval(timerInterval);
                alert("時間到！強制交卷。");
                backToDashboard();
            }
        }, 1000);
    }

    document.getElementById('btn-next').onclick = () => {
        currentIndex++;
        loadQuestion();
    };

    document.addEventListener('keydown', (e) => {
        if (document.getElementById('quiz-ui').style.display === 'none') return;
        
        const key = e.key.toUpperCase();
        const map = {'1':'A', '2':'B', '3':'C', '4':'D', 'A':'A', 'B':'B', 'C':'C', 'D':'D'};
        
        if (map[key] && !isAnswered) {
            const idx = map[key].charCodeAt(0) - 65; 
            const opts = document.querySelectorAll('.option');
            if(opts[idx]) checkAnswer(map[key], currentQuizList[currentIndex].answer, opts[idx]);
        } else if (key === 'J' || key === 'ENTER') {
            if(isAnswered) {
                currentIndex++;
                loadQuestion();
            }
        } else if (key === 'F') { 
             toggleStar();
        }
    });
</script>

</body>
</html>
